defaults:
  - training_backend/fsdp@actor.fsdp_config
  - model/dreamzero_5b@actor.model
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}
    - file://${oc.env:EMBODIED_PATH}/config

cluster:
  num_nodes: 1
  component_placement:
    actor: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: robotwin2_motion_sft_dreamzero_5b
    logger_backends: ["tensorboard"]
  max_epochs: -1
  max_steps: 100000
  val_check_interval: -1
  save_interval: 50000
  log_interval: 100
  resume_dir: null

data:
  dataset_type: robotwin2
  train_data_paths: ${oc.env:ROBOTWIN2_MOTION_DATA_ROOT,/inspire/qb-ilm2/project/robot-body/public/Robotwin_Motion}
  robotwin2_root: ${data.train_data_paths}
  robotwin2_subsets: ${oc.env:ROBOTWIN2_SUBSETS,aloha-agilex_clean_50 aloha-agilex_randomized_500}
  robotwin2_task_paths: null
  robotwin2_max_tasks: null
  robotwin2_task_name_contains: null
  robotwin2_metadata_json_path: null
  robotwin2_metadata_percentile_mixing_method: min_max
  robotwin2_fast_local_index: true
  lazy_load: true
  num_workers: 2
  prefetch_factor: 1
  pin_memory: true
  parquet_cache_size: 16
  video_tolerance_s: 0.1
  video_backend: torchcodec
  sampling_mode: multi_anchor
  robotwin2_macro_stride: 48
  robotwin2_video_frame_stride: 6
  motion_downsample_ratio: 6
  motion_cache_size: 0
  drop_motion_npy_file_cache: true
  robotwin2_bad_sample_resample_attempts: 32

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 128
  seed: 42

  model:
    model_type: "dreamzero"
    precision: fp32
    model_path: null
    tokenizer_path: ${oc.env:TOKENIZER_DIR,/inspire/hdd/project/robot-body/linbokai-CZXS24250037/dreamzero/checkpoints/umt5-xxl}
    diffusion_model_pretrained_path: ${oc.env:WAN22_CKPT_DIR,/inspire/hdd/project/robot-body/linbokai-CZXS24250037/dreamzero/checkpoints/Wan2.2-TI2V-5B}
    image_encoder_pretrained_path: ${oc.env:IMAGE_ENCODER_PATH,/inspire/hdd/project/robot-body/linbokai-CZXS24250037/dreamzero/checkpoints/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth}
    text_encoder_pretrained_path: ${actor.model.diffusion_model_pretrained_path}/models_t5_umt5-xxl-enc-bf16.pth
    vae_pretrained_path: ${actor.model.diffusion_model_pretrained_path}/Wan2.2_VAE.pth
    metadata_json_path: null
    motion_vae_pretrained_path: ${oc.env:MOTION_VAE_CKPT_DIR,/inspire/hdd/project/robot-body/linbokai-CZXS24250037/dreamzero/checkpoints/geometry_motion_vae}
    motion_vae_base_pretrained_model_name_or_path: ${oc.env:MOTION_VAE_BASE_MODEL_DIR,/inspire/hdd/project/robot-body/linbokai-CZXS24250037/dreamzero/checkpoints/stable-diffusion-v1-5}

    embodiment_tag: "robotwin2"
    embodiment_tag_mapping:
      robotwin2: 0

    action_dim: 14
    max_action_dim: 14
    max_state_dim: 14
    state_horizon: 1
    action_horizon: 48
    num_action_per_block: 48
    target_video_height: 256
    target_video_width: 320
    relative_action: false
    relative_action_per_horizon: false
    is_lora: false

    action_head_cfg:
      config:
        num_frames: 9
        num_frame_per_block: 2
        num_action_per_block: 48
        max_action_dim: 14
        max_state_dim: 14
        target_video_height: 256
        target_video_width: 320
        action_loss_embodiment_ids: [0]
        use_motion_modality: true
        motion_horizon: 8
        motion_latent_channels: 8
        per_motion_seqlen: 20
        decode_motion_on_inference: false
        return_motion_latent_only: true
        motion_vae_cfg:
          _target_: groot.vla.model.dreamzero.modules.motioncrafter_motion_vae.MotionCrafterMotionVAE
          _convert_: object
          pretrained_model_name_or_path: TencentARC/MotionCrafter
          subfolder: geometry_motion_vae
          pretrained_path: ${actor.model.motion_vae_pretrained_path}
          base_vae_pretrained_model_name_or_path: ${actor.model.motion_vae_base_pretrained_model_name_or_path}
          base_vae_subfolder: vae
          base_vae_local_files_only: true
          freeze_vae: true
          motion_supervision_spatial_size: [64, 80]
        diffusion_model_cfg:
          action_dim: 14
          max_state_dim: 14
          frame_seqlen: 80
          use_motion_modality: true
          num_motion_per_block: 8
          motion_latent_channels: 8
          per_motion_seqlen: 20
          motion_latent_spatial_size: [8, 10]
          model_type: ti2v
          in_dim: 48
          out_dim: 48
          dim: 3072
          ffn_dim: 14336
          num_heads: 24
          num_layers: 30
          max_chunk_size: 1
          max_num_embodiments: 1
          num_frame_per_block: 2
          num_action_per_block: 48
          num_state_per_block: 1
          concat_first_frame_latent: false
        vae_cfg:
          _target_: groot.vla.model.dreamzero.modules.wan_video_vae.WanVideoVAE38
          _convert_: object
          z_dim: 48
          dim: 160
          vae_pretrained_path: ${actor.model.vae_pretrained_path}

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.95
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 1.0e-5
    clip_grad: 0.5
    lr_scheduler: "cosine"
    lr_warmup_steps: -1
    lr_warmup_steps_ratio: 0.05
    total_training_steps: 100000
  fsdp_config:
    strategy: "fsdp2"
    use_orig_params: true
    gradient_checkpointing: true
    gradient_checkpointing_use_reentrant: true
    limit_all_gathers: false
    forward_prefetch: true
    backward_prefetch: "pre"
    reshard_after_forward: false
    checkpoint_format: local_shard
    save_full_model_weights: false
    grad_scaler:
      enabled: false
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16
    amp_autocast:
      enabled: false
      precision: "bf16"
